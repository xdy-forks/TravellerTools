services:
  travellertools-web-dev:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    profiles:
      - dev
    working_dir: /src
    command: dotnet run --no-launch-profile --project Grauenwolf.TravellerTools.Web/Grauenwolf.TravellerTools.Web.csproj
    volumes:
      - ./:/src
      - nuget-cache:/root/.nuget/packages
      - aspnet-data-protection:/root/.aspnet/DataProtection-Keys
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

volumes:
  nuget-cache:
  aspnet-data-protection:

